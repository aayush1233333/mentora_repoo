services:
  - type: web
    runtime: python
    name: mentora-backend
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -c backend/gunicorn.conf.py backend.main:app
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: WEB_CONCURRENCY
        value: 1
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: CORS_ORIGINS
        value: https://mentora-repoo.vercel.app
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: OPENAI_API_KEY
        sync: false
